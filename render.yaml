services:
  - type: web
    name: cas-api
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run prisma:generate && npm run prisma:migrate:deploy
    startCommand: npm run start:api
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: CORS_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 150
      - key: LOG_LEVEL
        value: info
